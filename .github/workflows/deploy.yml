name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd app
            git pull origin main

            # SECRET_KEY обязателен для JWT; если в .env нет — создаём
            if [ ! -f .env ]; then
              echo "ERROR: .env отсутствует на сервере"
              exit 1
            fi
            if ! grep -qE '^SECRET_KEY=.+' .env; then
              echo "SECRET_KEY=$(openssl rand -hex 32)" >> .env
              echo "Added SECRET_KEY to .env"
            fi

            # Убираем старый контейнер бота, если остался
            docker compose stop bot 2>/dev/null || true
            docker compose rm -f bot 2>/dev/null || true
            docker rm -f $(docker ps -aq --filter name=bot) 2>/dev/null || true

            docker compose down
            docker compose build --pull=false backend frontend
            RESET_DB=1 docker compose up -d
